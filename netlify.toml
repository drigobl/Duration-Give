[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  YARN_FLAGS = "--ignore-engines"

# Production context
[context.production]
  command = "npm install && npm run build"

# Asset optimization
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = true
[build.processing.images]
  compress = true

# Headers to enable security features
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' wss: https:; frame-ancestors 'none';"
    Cache-Control = "public, max-age=0"

# Cache control for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

# Headers for images
[[headers]]
  for = "*.svg"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Content-Type = "image/svg+xml"

[[headers]]
  for = "*.png"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Content-Type = "image/png"

[[headers]]
  for = "*.jpg"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Content-Type = "image/jpeg"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Content-Type = "image/jpeg"

# Redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200