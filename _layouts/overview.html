---
layout: default
---

<article class="overview-page">
  <div class="overview-container">
    <div class="overview-header">
      <h1>{{ page.title }}</h1>
      {% if page.description %}
        <p class="overview-subtitle">{{ page.description }}</p>
      {% endif %}
    </div>

    <div class="overview-content">
      {{ content }}
    </div>
  </div>
</article>
