<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  
  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="{{ "/assets/logo.svg" | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "/assets/favicon-32x32.png" | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ "/assets/favicon-16x16.png" | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ "/assets/apple-touch-icon.png" | relative_url }}">
  <link rel="mask-icon" href="{{ "/assets/logo.svg" | relative_url }}" color="#4F46E5">
  <meta name="theme-color" content="#4F46E5">
  
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
</head>
<body>
  <a href="#main-content" class="skip-to-main">Skip to main content</a>
  
  <header class="site-header" role="banner">
    <div class="wrapper">
      <a class="site-title" href="{{ "/" | relative_url }}" aria-label="Give Protocol Documentation Home">
        <img src="{{ "/assets/logo.svg" | relative_url }}" alt="" role="presentation" style="height: 2rem; width: 2rem;">
        <span>{{ site.title }}</span>
      </a>
      <div class="header-right">
        <div class="site-search" role="search">
          <label for="search-input" class="sr-only">Search documentation</label>
          <div class="search-input-wrapper">
            <input type="search" id="search-input" class="search-input" placeholder="Search docs..." aria-label="Search documentation" />
            <kbd class="search-shortcut">⌘K</kbd>
          </div>
          <div class="search-results" role="region" aria-live="polite" aria-label="Search results"></div>
        </div>
        <a href="https://giveprotocol.io/login" class="btn btn-return-app" target="_blank" rel="noopener noreferrer">
          <span class="return-icon">←</span>
          <span class="return-text">Return to App</span>
        </a>
      </div>
    </div>
  </header>

  <main id="main-content" class="page-content" role="main" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <p>&copy; {{ 'now' | date: "%Y" }} Give Protocol. Licensed under MIT.</p>
    </div>
  </footer>
  
  <script src="{{ "/assets/js/search.js" | relative_url }}"></script>
  <script src="{{ "/assets/js/navigation.js" | relative_url }}"></script>
  <script src="{{ "/assets/js/accessibility.js" | relative_url }}"></script>
</body>
</html>
